site_name: webots-hppo-stair-climbing
site_description: Webots HPPO stair-climbing project code documentation.
site_author: SiYou
repo_name: webots-hppo-stair-climbing
repo_url: https://github.com/YOUR_GITHUB_USERNAME/webots-hppo-stair-climbing
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: false

theme:
  name: material
  language: zh
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font:
    text: Noto Sans Simplified Chinese
    code: JetBrains Mono
  features:
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang:
        - zh
        - en
  - roamlinks

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - 总体文件概览: notes/project/总体文件概览.md
  - Webots 接口: notes/project/Webots_interface.py.md
  - 状态输入: notes/project/关于网络/状态输入.md
  - 日志方法: notes/project/关于日志的方法.md
  - PPO_episoid_1 训练流程: notes/project/训练流程/PPO_episoid_1训练流程说明书.md
  - Train Manager: notes/project/训练流程/train manager在干什么.md
  - RobotRun 总体说明: notes/project/关于robotRUN/总体说明.md
  - RobotRun0 决策层流程: notes/project/关于robotRUN/RobotRun0_决策层/01_总流程与动作逻辑.md
  - RobotRun0 决策层函数: notes/project/关于robotRUN/RobotRun0_决策层/02_函数说明.md
  - RobotRun1 抓取层流程: notes/project/关于robotRUN/RobotRun1_抓取层/01_总流程与动作逻辑.md
  - RobotRun1 抓取层函数: notes/project/关于robotRUN/RobotRun1_抓取层/02_函数说明.md
  - RobotRun2 踩踏层流程: notes/project/关于robotRUN/RobotRun2_踩踏层/01_总流程与动作逻辑.md
  - RobotRun2 踩踏层函数: notes/project/关于robotRUN/RobotRun2_踩踏层/02_函数说明.md
